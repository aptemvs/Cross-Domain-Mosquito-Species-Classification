[workspace]
authors = []
channels = ["conda-forge"]
name = "Cross-Domain-Mosquito-Species-Classification"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.12.*"

[pypi-dependencies]
torch = "==2.11.0"
librosa = ">=0.11.0, <0.12"
matplotlib = ">=3.10.9, <4"
numpy = ">=2.4.3, <3"
torchvision = ">=0.26.0, <0.27"
torchlibrosa = ">=0.1.0, <0.2"
wandb = ">=0.26.1, <0.27"

[feature.cuda]
system-requirements = { cuda = "12.8" }
[feature.cuda.pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cu128"]

[feature.rocm]
[feature.rocm.pypi-options]
index-url = "https://pypi.org/simple"
find-links = [
    { url = "https://repo.radeon.com/rocm/manylinux/rocm-rel-7.2.2/" }
]
# Patched pytorch that allocates at least 256MB for MIOpen Conv Algorithm Finder
dependency-overrides = { torch = { url = "https://github.com/aptemvs/Cross-Domain-Mosquito-Species-Classification/raw/refs/heads/external/torch-2.11.0a0+git70d99e9-cp312-cp312-linux_x86_64.whl" } }

[feature.rocm.pypi-dependencies]
torch = "==2.11.0"


[environments]
cuda = { features = ["cuda"] }
rocm = { features = ["rocm"] }

